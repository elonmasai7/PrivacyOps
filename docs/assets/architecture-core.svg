<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="PrivacyOps Africa Core architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .title { font: 700 28px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .text { font: 500 13px sans-serif; fill: #1e293b; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 16; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)" />
  <text x="40" y="52" class="title">PrivacyOps Africa Core - Modular Architecture</text>

  <rect class="card" x="40" y="100" width="300" height="180" />
  <text x="60" y="135" class="label">Frontend (Next.js)</text>
  <text x="60" y="160" class="text">- Workspace modules</text>
  <text x="60" y="182" class="text">- Role-aware navigation</text>
  <text x="60" y="204" class="text">- Real data forms + exports</text>
  <text x="60" y="226" class="text">- Integration and admin views</text>

  <rect class="card" x="430" y="100" width="330" height="230" />
  <text x="450" y="135" class="label">Backend API (FastAPI)</text>
  <text x="450" y="160" class="text">- Auth, RBAC, org isolation</text>
  <text x="450" y="182" class="text">- Framework pack registry</text>
  <text x="450" y="204" class="text">- Workflow CRUD + filter + export</text>
  <text x="450" y="226" class="text">- Evidence, reports, readiness scoring</text>
  <text x="450" y="248" class="text">- Integrations (GitHub, GitLab, AWS)</text>
  <text x="450" y="270" class="text">- Admin settings + job control</text>

  <rect class="card" x="860" y="100" width="300" height="180" />
  <text x="880" y="135" class="label">External Systems</text>
  <text x="880" y="160" class="text">- GitHub API</text>
  <text x="880" y="182" class="text">- GitLab API</text>
  <text x="880" y="204" class="text">- AWS APIs</text>
  <text x="880" y="226" class="text">- Manual evidence fallbacks</text>

  <rect class="card" x="240" y="390" width="320" height="210" />
  <text x="260" y="425" class="label">PostgreSQL Data Layer</text>
  <text x="260" y="450" class="text">- Organizations, memberships, RBAC</text>
  <text x="260" y="472" class="text">- Frameworks, controls, mappings</text>
  <text x="260" y="494" class="text">- DSR, incidents, vendors, tasks</text>
  <text x="260" y="516" class="text">- Policies, evidence, reports</text>
  <text x="260" y="538" class="text">- Audit logs, system settings, jobs</text>

  <rect class="card" x="660" y="390" width="320" height="210" />
  <text x="680" y="425" class="label">Storage and Operations</text>
  <text x="680" y="450" class="text">- Evidence uploads (hash tracked)</text>
  <text x="680" y="472" class="text">- Report export files</text>
  <text x="680" y="494" class="text">- Redis-ready background workflows</text>
  <text x="680" y="516" class="text">- Docker self-host deployment</text>
  <text x="680" y="538" class="text">- CI for lint/typecheck/tests/build</text>

  <path class="arrow" d="M340 190 L430 190" />
  <path class="arrow" d="M760 190 L860 190" />
  <path class="arrow" d="M560 330 L420 390" />
  <path class="arrow" d="M640 330 L760 390" />
  <path class="arrow" d="M840 280 L840 390" />
</svg>
